<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر الألعاب</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #f4f5f7;
            font-family: -apple-system, 'Segoe UI', Tahoma, Arial, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }

        /* ── Welcome bar ── */
        .welcome {
            background: #fff;
            border-radius: 18px;
            padding: 14px 18px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
        }
        .welcome-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .welcome-name { font-size: .95rem; font-weight: 800; color: #1a1a2e; }
        .welcome-sub  { font-size: .78rem; color: #888; margin-top: 2px; }

        /* ── Balance pill ── */
        .balance-pill {
            background: linear-gradient(135deg,#43cea2,#185a9d);
            border-radius: 14px;
            padding: 12px 18px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(67,206,162,.3);
        }
        .balance-pill .bp-label { font-size: .82rem; opacity: .88; }
        .balance-pill .bp-amount { font-size: 1.5rem; font-weight: 900; }
        .balance-pill .bp-cur { font-size: .8rem; opacity: .8; }
        .balance-pill .bp-icon { font-size: 2rem; }

        /* ── Section label ── */
        .sec-label {
            font-size: .78rem; font-weight: 800;
            color: #999; letter-spacing: .6px;
            text-transform: uppercase;
            margin: 14px 4px 8px;
        }

        /* ── Button grid ── */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

        /* ── Action button ── */
        .act-btn {
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 5px 16px rgba(0,0,0,.13);
            transition: transform .14s ease, box-shadow .14s ease;
            user-select: none;
            border: none;
            outline: none;
        }
        .act-btn:active { transform: scale(.93); box-shadow: 0 2px 6px rgba(0,0,0,.13); }
        .act-btn .ab-icon  { font-size: 2rem; display: block; margin-bottom: 7px; }
        .act-btn .ab-label { font-size: .9rem; font-weight: 800; }

        /* individual button colors */
        .btn-start   { background: linear-gradient(135deg,#11998e,#38ef7d); box-shadow: 0 5px 16px rgba(17,153,142,.3); }
        .btn-goods   { background: linear-gradient(135deg,#8e2de2,#4a00e0); box-shadow: 0 5px 16px rgba(142,45,226,.3); }
        .btn-balance { background: linear-gradient(135deg,#f7971e,#ffd200); box-shadow: 0 5px 16px rgba(247,151,30,.3); }
        .btn-orders  { background: linear-gradient(135deg,#2193b0,#6dd5ed); box-shadow: 0 5px 16px rgba(33,147,176,.3); }
        .btn-charge  { background: linear-gradient(135deg,#43cea2,#185a9d); box-shadow: 0 5px 16px rgba(67,206,162,.3); }
        .btn-support { background: linear-gradient(135deg,#f85032,#e73827); box-shadow: 0 5px 16px rgba(248,80,50,.3); }

        /* ── Goods sub-section ── */
        .goods-section {
            display: none;
            margin-top: 12px;
        }
        .goods-section.open { display: block; animation: popIn .22s ease; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .goods-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 14px; }

        /* game category cards */
        .game-btn {
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(0,0,0,.16);
            transition: transform .14s ease;
            user-select: none;
            position: relative;
            overflow: hidden;
        }
        .game-btn:active { transform: scale(.93); }
        .game-btn::before {
            content: '';
            position: absolute; top: -20%; right: -10%;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,.12);
        }
        .game-btn .gb-icon  { font-size: 2.2rem; display: block; margin-bottom: 7px; }
        .game-btn .gb-label { font-size: .95rem; font-weight: 900; }
        .game-btn .gb-sub   { font-size: .72rem; opacity: .82; margin-top: 3px; }

        .btn-ff   { background: linear-gradient(135deg,#ff416c,#ff4b2b); box-shadow: 0 5px 16px rgba(255,65,108,.3); }
        .btn-pubg { background: linear-gradient(135deg,#f7b733,#fc4a1a); box-shadow: 0 5px 16px rgba(247,183,51,.3); }

        /* ── Items list ── */
        .items-box {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
        }
        .items-box-header {
            padding: 12px 16px;
            font-weight: 800;
            font-size: .9rem;
            border-bottom: 1px solid #f0f0f0;
            color: #1a1a2e;
        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #f7f7f7;
        }
        .item-row:last-child { border-bottom: none; }
        .item-left { display: flex; align-items: center; gap: 10px; }
        .item-ico {
            width: 40px; height: 40px;
            background: #f3f4f6; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .item-name { font-size: .88rem; font-weight: 700; color: #1a1a2e; }
        .item-desc { font-size: .73rem; color: #888; margin-top: 1px; }
        .item-price { font-size: .9rem; font-weight: 900; color: #11998e; white-space: nowrap; }

        .loading-txt { text-align: center; padding: 22px; color: #aaa; font-size: .85rem; }
        .empty-txt   { text-align: center; padding: 22px; color: #bbb; font-size: .85rem; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(20,20,20,.9); color: #fff;
            padding: 10px 20px; border-radius: 50px;
            font-size: .84rem; font-weight: 700; z-index: 9999;
            transition: transform .25s ease; pointer-events: none;
        }
        .toast.on { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Welcome -->
<div class="welcome">
    <div class="welcome-avatar">🎮</div>
    <div>
        <div class="welcome-name" id="uname">مرحباً!</div>
        <div class="welcome-sub">متجر الألعاب المتخصص</div>
    </div>
</div>

<!-- Balance -->
<div class="balance-pill">
    <div>
        <div class="bp-label">💰 رصيدك الحالي</div>
        <div><span class="bp-amount" id="bal">--</span> <span class="bp-cur">ل.س</span></div>
    </div>
    <div class="bp-icon">💳</div>
</div>

<!-- Buttons -->
<div class="sec-label">القائمة الرئيسية</div>

<div class="btn-grid">
    <button class="act-btn btn-start" onclick="sendCmd('/start')">
        <span class="ab-icon">🏁</span>
        <span class="ab-label">Start</span>
    </button>
    <button class="act-btn btn-goods" onclick="toggleGoods()">
        <span class="ab-icon">🛍️</span>
        <span class="ab-label">السلع</span>
    </button>
    <button class="act-btn btn-balance" onclick="sendCmd('💰 رصيدي')">
        <span class="ab-icon">💰</span>
        <span class="ab-label">رصيدي</span>
    </button>
    <button class="act-btn btn-orders" onclick="sendCmd('📦 طلباتي')">
        <span class="ab-icon">📦</span>
        <span class="ab-label">طلباتي</span>
    </button>
    <button class="act-btn btn-charge" onclick="sendCmd('➕ شحن رصيد')">
        <span class="ab-icon">➕</span>
        <span class="ab-label">شحن رصيد</span>
    </button>
    <button class="act-btn btn-support" onclick="sendCmd('👨‍💻 الدعم')">
        <span class="ab-icon">👨‍💻</span>
        <span class="ab-label">الدعم</span>
    </button>
</div>

<!-- Goods sub-section -->
<div class="goods-section" id="goods-section">
    <div class="sec-label">اختر اللعبة</div>
    <div class="goods-row">
        <div class="game-btn btn-ff" onclick="loadItems('ff')">
            <span class="gb-icon">🔥</span>
            <div class="gb-label">فري فاير</div>
            <div class="gb-sub">جواهر وباصات</div>
        </div>
        <div class="game-btn btn-pubg" onclick="loadItems('pubg')">
            <span class="gb-icon">🎯</span>
            <div class="gb-label">ببجي</div>
            <div class="gb-sub">UC والمزيد</div>
        </div>
    </div>

    <div class="items-box" id="items-box" style="display:none;">
        <div class="items-box-header" id="items-header">المنتجات</div>
        <div id="items-body"><div class="loading-txt">⏳ جاري التحميل...</div></div>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const user = tg?.initDataUnsafe?.user || {};
    const uid  = user?.id || null;

    // greeting
    document.getElementById('uname').textContent =
        'مرحباً، ' + (user.first_name || 'صديقي') + '!';

    // balance
    (async () => {
        if (!uid) return;
        try {
            const r = await fetch('/api/public/balance/' + uid);
            const d = await r.json();
            document.getElementById('bal').textContent = d.balance ?? 0;
        } catch { document.getElementById('bal').textContent = '0'; }
    })();

    // goods cache
    let goodsCache = null;
    async function getGoods() {
        if (goodsCache) return goodsCache;
        try {
            const r = await fetch('/api/public/goods');
            goodsCache = await r.json();
        } catch { goodsCache = []; }
        return goodsCache;
    }

    // toggle goods panel
    let goodsOpen = false;
    function toggleGoods() {
        goodsOpen = !goodsOpen;
        const sec = document.getElementById('goods-section');
        sec.classList.toggle('open', goodsOpen);
        if (!goodsOpen) document.getElementById('items-box').style.display = 'none';
    }

    // load items for a game
    async function loadItems(game) {
        const box    = document.getElementById('items-box');
        const header = document.getElementById('items-header');
        const body   = document.getElementById('items-body');

        box.style.display = 'block';
        body.innerHTML = '<div class="loading-txt">⏳ جاري التحميل...</div>';

        const all = await getGoods();
        let items;
        if (game === 'ff') {
            header.textContent = '🔥 فري فاير';
            items = all.filter(g => /فري فاير|free fire/i.test(g.name));
        } else {
            header.textContent = '🎯 ببجي';
            items = all.filter(g => /ببجي|pubg|بابجي/i.test(g.name));
        }

        if (items.length === 0) {
            body.innerHTML = '<div class="empty-txt">لا توجد منتجات متاحة حالياً</div>';
            return;
        }

        body.innerHTML = items.map(it => `
            <div class="item-row">
                <div class="item-left">
                    <div class="item-ico">${emoji(it.name)}</div>
                    <div>
                        <div class="item-name">${it.name}</div>
                        ${it.description ? `<div class="item-desc">${it.description}</div>` : ''}
                    </div>
                </div>
                <div class="item-price">${Math.round(it.price)} ل.س</div>
            </div>`).join('');
    }

    function emoji(n) {
        if (/جوهر|جواهر|💎/i.test(n)) return '💎';
        if (/باص|بطاقة|pass/i.test(n))  return '🎫';
        if (/\buc\b/i.test(n))            return '🪙';
        if (/موسم|مرور/i.test(n))         return '📦';
        return '🎮';
    }

    // send command back to bot and close webapp
    function sendCmd(cmd) {
        if (tg) {
            tg.sendData(cmd);
        } else {
            showToast('افتح من البوت');
        }
    }

    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('on');
        setTimeout(() => el.classList.remove('on'), 2200);
    }
</script>
</body>
</html>
